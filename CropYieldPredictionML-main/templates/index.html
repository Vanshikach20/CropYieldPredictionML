<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>🌾 Crop Yield Prediction</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(to right, #e0f7fa, #e8f5e9);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding-top: 40px;
        }
        .container {
            background-color: #ffffff;
            border-radius: 15px;
            padding: 40px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.1);
        }
        h1 {
            font-weight: 700;
            color: #2e7d32;
        }
        .lead {
            font-size: 1.2rem;
            color: #555;
        }
        .btn-custom {
            background-color: #2e7d32;
            color: #fff;
            font-size: 1.1rem;
            padding: 10px 30px;
            border-radius: 30px;
            transition: 0.3s ease;
        }
        .btn-custom:hover {
            background-color: #1b5e20;
            color: #fff;
        }
        .result-box {
            background-color: #f1f8e9;
            border-left: 6px solid #388e3c;
            padding: 20px;
            border-radius: 8px;
            margin-top: 25px;
        }
        .result-box h4 {
            color: #2e7d32;
        }
        .footer {
            margin-top: 40px;
            font-size: 0.9rem;
            text-align: center;
            color: #888;
        }
    </style>
</head>
<body>

<div class="container text-center">
    <h1>🌾 Crop Yield Prediction</h1>
    <p class="lead">Predict your crop yield using real-time ML insights</p>

    <div class="mt-4">
        <a href="/predict" class="btn btn-custom">Start Prediction</a>
    </div>

    {% if final_result %}
    <div class="result-box text-start mt-5">
        <h4>📈 Prediction Results</h4>
        <p><strong>{{ final_result }}</strong></p>
        <p><strong>{{ yield_result }}</strong></p>
        <div class="mt-3 text-center">
            <a href="/predict" class="btn btn-outline-success">🔁 Try Another Prediction</a>
        </div>
    </div>
    {% endif %}

    <div class="footer mt-5">
        &copy; 2025 SmartCrop Prediction with ML by <b>Sarthak</b>
        <!-- Social Media Icons -->
        <footer>
            <a href="https://www.linkedin.com/in/sarthak-singh-shishodia-8459ba28a?utm_source=share&utm_campaign=share_via&utm_content=profile&utm_medium=android" target="_blank" class="me-3">
             <i class="fab fa-linkedin fa-2x" style="color: #0A66C2;"></i>
        </a>

        <a href="https://github.com/sarthak3106" target="_blank">
            <i class="fab fa-github fa-2x" style="color: #333;"></i>
        </a>    
        </footer>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
