<!DOCTYPE html>
<html>
<head>
    <title>Crop Prediction Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f5f5f5;
            padding: 20px;
        }
        .container {
            background-color: white;
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.1);
            margin-top: 30px;
        }
        h1 {
            color: #2e7d32;
            margin-bottom: 30px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .btn-submit {
            background-color: #2e7d32;
            color: white;
            padding: 10px 30px;
        }
        .error-alert {
            margin-top: 20px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row">
            <div class="col-md-12 text-center">
                <h1>🌾 Crop Prediction Form</h1>
                <p class="lead">Enter the required information to predict crop production</p>
            </div>
        </div>

        {% if error %}
        <div class="row">
            <div class="col-md-8 mx-auto">
                <div class="alert alert-danger error-alert" role="alert">
                    {{ error }}
                </div>
            </div>
        </div>
        {% endif %}

        <div class="row">
            <div class="col-md-8 mx-auto">
                <form action="/predict" method="POST">
                    <div class="row">
                        <div class="col-md-6 form-group">
                            <label for="N">Nitrogen (N):</label>
                            <input type="number" class="form-control" id="N" name="N" step="0.01" required>
                        </div>
                        <div class="col-md-6 form-group">
                            <label for="P">Phosphorus (P):</label>
                            <input type="number" class="form-control" id="P" name="P" step="0.01" required>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 form-group">
                            <label for="K">Potassium (K):</label>
                            <input type="number" class="form-control" id="K" name="K" step="0.01" required>
                        </div>
                        <div class="col-md-6 form-group">
                            <label for="pH">pH:</label>
                            <input type="number" class="form-control" id="pH" name="pH" step="0.1" min="0" max="14" required>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 form-group">
                            <label for="rainfall">Rainfall (mm):</label>
                            <input type="number" class="form-control" id="rainfall" name="rainfall" step="0.01" required>
                        </div>
                        <div class="col-md-6 form-group">
                            <label for="temperature">Temperature (°C):</label>
                            <input type="number" class="form-control" id="temperature" name="temperature" step="0.01" required>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 form-group">
                            <label for="Area_in_hectares">Area (hectares):</label>
                            <input type="number" class="form-control" id="Area_in_hectares" name="Area_in_hectares" step="0.01" required>
                        </div>
                        <div class="col-md-6 form-group">
                            <label for="State_Name">State:</label>
                            <select class="form-control" id="State_Name" name="State_Name" required>
                                <option value="">Select State</option>
                                <option value="Andhra Pradesh">Andhra Pradesh</option>
                                <option value="Assam">Assam</option>
                                <option value="Bihar">Bihar</option>
                                <option value="Gujarat">Gujarat</option>
                                <option value="Karnataka">Karnataka</option>
                                <option value="Kerala">Kerala</option>
                                <option value="Madhya Pradesh">Madhya Pradesh</option>
                                <option value="Maharashtra">Maharashtra</option>
                                <option value="Punjab">Punjab</option>
                                <option value="Tamil Nadu">Tamil Nadu</option>
                                <option value="Uttar Pradesh">Uttar Pradesh</option>
                                <option value="West Bengal">West Bengal</option>
                            </select>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 form-group">
                            <label for="Crop_Type">Crop Type:</label>
                            <select class="form-control" id="Crop_Type" name="Crop_Type" required>
                                <option value="">Select Crop Type</option>
                                <option value="Kharif">Kharif</option>
                                <option value="Rabi">Rabi</option>
                                <option value="Zaid">Zaid</option>
                            </select>
                        </div>
                        <div class="col-md-6 form-group">
                            <label for="Crop">Crop:</label>
                            <select class="form-control" id="Crop" name="Crop" required>
                                <option value="">Select Crop</option>
                                <option value="Rice">Rice</option>
                                <option value="Wheat">Wheat</option>
                                <option value="Maize">Maize</option>
                                <option value="Cotton">Cotton</option>
                                <option value="Sugarcane">Sugarcane</option>
                                <option value="Potato">Potato</option>
                                <option value="Onion">Onion</option>
                                <option value="Tomato">Tomato</option>
                            </select>
                        </div>
                    </div>

                    <div class="row mt-4">
                        <div class="col-md-12 text-center">
                            <button type="submit" class="btn btn-submit">Predict</button>
                            <a href="/" class="btn btn-outline-secondary ms-3">Cancel</a>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
